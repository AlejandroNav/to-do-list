<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
<script defer src="./main.js"></script></head>

<body>
    <div id="app">
        <aside id="sidebar">
            <h2>Projects</h2>
            <ul id="project-list"></ul>
            <button id="add-project-btn">+ New Project</button>
        </aside>

        <main id="main">
            <header id="top-bar">
                <h1>Tasky</h1>
            </header>
            <h2 id="active-project-title">Select a project</h2>
            <ul id="task-list"></ul>
            <button id="add-task-btn">+ Add Task</button>
        </main>

        <div id="modal" class="hidden">
            <div id="modal-content">
                <h2>Edit Task</h2>
                <label>Title
                    <input type="text" id="modal-title" />
                </label>
                <label>Description
                    <textarea id="modal-description"></textarea>
                </label>
                <label>Due Date
                    <input type="date" id="modal-due-date" />
                </label>
                <label>Priority
                    <select id="modal-priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </label>
                <label>Notes
                    <textarea id="modal-notes"></textarea>
                </label>
                <div id="modal-actions">
                    <button id="modal-save">Save</button>
                    <button id="modal-cancel">Cancel</button>
                </div>
            </div>
        </div>
        <div id="project-modal" class="hidden">
            <div id="project-modal-content">
                <h2>New Project</h2>
                <label>Name
                    <input type="text" id="project-modal-name" placeholder="Project name..." />
                </label>
                <div id="modal-actions">
                    <button id="project-modal-save">Save</button>
                    <button id="project-modal-cancel">Cancel</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
